name: build

on:
  push:
    branches: [ main, dev ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # lint-test:
    # uses: ./.github/workflows/lint-test.yml
  build:
    runs-on: ubuntu-latest
    # needs: ['lint-test']
    permissions:
      security-events: write
      packages: write
      contents: read
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging-{{sha}}-{{date 'YYYYMMDDHHmmss'}},enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Default tag if not in metadata action
        id: set_tag
        run: |
          if [ -z "${{ steps.meta.output.tags }}" ]; then
            TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:temp-${GITHUB_SHA:8}-$(date +%s)"
          else
            TAG="${{ steps.meta.outputs.tags }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT


      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          provenance: false
          push: false
          pull: true
          load: true
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ steps.set_tag.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan image for vuln
        id: scan
        uses: anchore/scan-action@v6
        with:
          image: ${{ steps.set_tag.outputs.tag }}
          fail-build: false
          severity-cutoff: critical
    
      - name: upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

      - name: Inspect action SARIF report
        run: cat ${{ steps.scan.outputs.sarif }}