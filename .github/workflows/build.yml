name: build

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main, dev]
  workflow_run:
    workflows: [lint-test]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging-{{sha}}-{{date 'YYYYMMDDHHmmss'}},enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Default tag if not in metadata action
        id: set_tag
        run: |
          if [ -z "${{ steps.meta.output.tags }}" ]; then
            TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:temp-${GITHUB_SHA:8}-$(date +%s)"
          else
            TAG="${{ steps.meta.outputs.tags }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT


      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          provenance: false
          push: false
          pull: true
          load: true
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ steps.set_tag.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}