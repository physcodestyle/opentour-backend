openapi: 3.0.3
info:
  title: OpenTour
  version: v1.0


tags:
  - name: Users
    description: Работа с профилями участников
  - name: Tours 
    description: Работа с турами
  - name: Guids
    description: Работа с профилями гидов
  - name: Chats
    description: Работа с чатами
  - name: Feedback
    description: Работа с отзывами
  - name: Knowledge Base 
    description: Работа с базой знаний (заметки)
  - name: Site Management
    description: Административные функции



paths:
  /tours/:
    get: 
      summary: Получить список туров
      tags:
        - Tours 
      parameters:
        - name: count 
          in: query
          required: false 
          description: 
            Число туров в списке
          schema: 
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          description: 
            Сдвиг от начала списка (для постраничной выборки)
          schema: 
            type: integer
            default: 0 
        - name: country 
          in: query
          required: false
          schema: 
            $ref: '#/components/schemas/Country'
        - name: city
          in: query
          required: false
          schema: 
            $ref: '#/components/schemas/City'
        - name: ageLimit
          in: query
          required: false
          schema: 
            $ref: '#/components/schemas/AgeLimit'
        - name: transportType
          in: query
          required: false
          schema: 
            $ref: '#/components/schemas/TourTransportType'
        - name: date
          in: query
          required: false
          schema: 
            type: array
            items: 
              type: string 
              format: date
      responses:
        200: 
          description: OK
          content:
            application/json:
              schema: 
                type: array
                items: 
                  $ref: '#/components/schemas/Tour'
    post: 
      summary: Создать тур
      tags: 
        - Tours
      requestBody: 
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/Tour'
      responses: 
        201: 
          description: Усепешно создано

  /tours/{tour_id}:
    get:
      summary: Получить информацию о туре
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      responses: 
        200: 
          description: OK
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/Tour'
        404: 
          description: Не найдено
    delete:
      summary: Удалить тур 
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      responses: 
        200: 
          description: OK
    put: 
      summary: Изменить информацию о туре
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      requestBody: 
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/Tour'
      responses: 
        200: 
          description: OK

  /tours/{tour_id}/shedule: 
    get: 
      summary: Получить расписание тура
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      responses: 
        200: 
          description: OK
          content:
            application/json:
              schema: 
                type: array
                description: 
                  Список дней с указанием статуса
                items:
                  $ref: '#/components/schemas/TourDay'
    put: 
      summary: Изменить расписание тура
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      requestBody: 
        content:
            application/json:
              schema: 
                type: array
                description: 
                  Список дней с указанием статуса
                items:
                  $ref: '#/components/schemas/TourDay'
      responses: 
        200: 
          description: OK
          
  /guids/{guide_id}:
    get:
      summary: Получить информацию о гиде
      tags:
        - Guids
      parameters:
        - name: guide_id 
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guide'
        404:
            description: Не найдено   
    delete:
      summary: удалить профиль гида
      tags:
        - Guids
      parameters:
        - name: guide_id 
          in: path
          required: true
          schema:
            type: integer       
      responses:
        200:
          description: OK
        404:
            description: Не найдено   
    post:
      summary: Создать профиль гида
      tags: 
        - Guids
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Guide'
      responses:
        201:        
          description: Успешно созданно   
        400:
          description: Ошибка в запросе
    put:
      summary: изменение профиля гида
      tags: 
        - Guids
      parameters:
          - name: guide_id 
            in: path
            required: true
            schema:
              type: integer
      requestBody:
        content:
          application/json:
              schema:
                type: array
                $ref: '#/components/schemas/Guide'
      responses:          
        200:
          description: OK        
        404:
          description: Не найдено

  /admin/users:
    get:
      tags:
        - Site Management
      summary: Получение списка пользователей
      responses:
        '200':
          description: Список участников
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Ошибка в запросе
        '404': 
          description: Пользователь(и) не найден(ы)
        '500':
          description: Ошибка сервера
          
          
  /admin/users/{user_id}:
    get:
      tags:
        - Site Management
      summary: Получение информации о пользователе
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: Уникальный идентификатор пользователя
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Ошибка в запросе
        '404': 
          description: Пользователь не найден
        '500':
          description: Ошибка сервера
    delete:
      tags:
        - Site Management
      summary: Удаление пользователя
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: Уникальный идентификатор пользователя
      responses:
        '200': 
          description: Участник успешно удален
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Пользователь user_12345 успешно удален'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '404': 
          description: Пользователь не найден
        '500':
          description: Ошибка сервера
    put:
      tags:
        - Site Management
      summary: Смена роли пользователя
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: Уникальный идентификатор пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleUpdate'
      responses:
        '200':
          description: Роль пользователя успешно изменена
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Роль пользователя user_12345 изменена на guide'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '404': 
          description: Пользователь не найден
        '500':
          description: Ошибка сервера
          
          
  /admin/logs:
    get:
      tags:
        - Site Management
      summary: Получение логов системы
      responses:
        '200':
          description: Список логов системы
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    timeStamp:
                      type: string
                      format: date-time
                      example: '2025-03-03T12:00:00Z'
                      description: Время события
                    level:
                      type: string
                      enum: ['INFO', 'WARNING', 'ERROR', 'DEBUG', 'FATAL']
                      example: 'INFO'
                      description: Уровень важности лога
                    message:
                      type: string
                      example: 'Пользователь успешно вошел в систему'
                      description: Сообщение лога
                    user_id:
                      type: string
                      example: 'user_12345'
                      description: Идентификатор пользователя, вызвавшего событие 
                  required:
                    - timeStamp
                    - level
                    - message
                    - user_id
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
    delete:  
      tags:
        - Site Management
      summary: Очищение логов системы
      responses:
        '200':
          description: Логи успешно очищены
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Логи успешно очищены'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
          
          
  /admin/backup:
    post:
      tags:
        - Site Management
      summary: Создание резервной копии
      responses:
        '200':
          description: Резервная копия успешно создана
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Резервная копия успешно создана'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера


  /admin/backup/list:
    get:
      tags:
        - Site Management
      summary: Получение списка резервных копий
      responses:
        '200':
          description: Список резервных копий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Backup'
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
          
          
  /admin/backup/restore:
    post:
      tags:
        - Site Management
      summary: Восстановление данных из резервной копии
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                backupID:
                  type: string
                  example: 'backup_12345'
                  description: Идентификатор резервной копии для восстановления
              required:
                - backupID
      responses:
        '200':
          description: Данные успешно восстановлены из резервной копии
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Данные успешно восстановлены из резервной копии backup_12345'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '404':
          description: Резервная копия не найдена
        '500':
          description: Ошибка сервера


  /admin/analytics/users:
    get:
      tags:
        - Site Management
      summary: Просмотр статистики по пользователям
      responses:
        '200':
          description: Статистика по пользователям
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsers:
                    type: integer
                    example: 1500
                    description: Общее количество пользователей
                  activeUsers:
                    type: integer
                    example: 1000
                    description: Количество активных пользователей
                  inactiveUsers:
                    type: integer
                    example: 500
                    description: Количество неактивных пользователей
                required:
                  - totalUsers
                  - activeUsers
                  - inactiveUsers
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
          
          
  /admin/analytics/content:
    get:
      tags:
        - Site Management
      summary: Просмотр статистики по контенту
      responses:
        '200':
          description: Статистика по контенту
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalNotes:
                    type: integer
                    example: 200
                    description: Общее количество заметок
                  totalTours:
                    type: integer
                    example: 50
                    description: Общее количество экскурсий
                  contentInteraction:
                    type: integer
                    example: 10000
                    description: Общее количество взаимодействий с контентом (просмотры, лайки, комментарии и т.д.)
                required:
                  - totalNotes
                  - totalTours
                  - contentInteraction
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
          
          
  /admin/analytics/system:
    get:
      tags:
        - Site Management
      summary: Аналитика работы системы
      responses:
        '200':
          description: Общая аналитика работы системы
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorsLast24h:
                    type: integer
                    example: 5
                    description: Количество ошибок за последние 24 часа
                  totalRequests:
                    type: integer
                    example: 100000
                    description: Общее количество запросов к системе
                required:
                  - errorsLast24h
                  - totalRequests
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера

      

components:
    Guide:
      type: object
      description: Профиль экскурсовода
      required:
        - guideID
        - guideName
      properties:
        guideID:
          type: integer
          readOnly: true
        guideName:
          type: string
        availableLanguages:
          type: array
          items: 
            $ref: '#/components/schemas/Language'
          description: 
            Языки которыми владеет экскурсовод
        guideRating:
          readOnly: true
          type: number
          description: 
            рейтинг экскурсовода
        guideNumberOfTour:
          readOnly: true
          type: integer
          description: 
            количество проведенных экскурсий
        guidePhotoProfile:
          type: string
          description: 
            Аватарка на профиле гида
        guidePhoto: 
          type: array
          items: 
            type: string
          description: остальные фото в профиле

    Tour: 
      type: object
      description: 
        Экскурсия
      required:
        - tourID 
        - tourName 
        - tourSummary 
        - duration 
        - ageLimit 
        - availableLanguages 
        - costs 
        - shedule 
        - transportType 
      properties: 
        tourID: 
          type: integer
          readOnly: true
        tourName:
          type: string
        tourSummary: 
          type: string
          description: 
            Краткое описание экскурсии
        tourDescription:
          type: string
          description: 
            Полное описание экскурсии
        duration:
          type: integer
          description: 
            Длительность экскурсии (в минутах)
        hardwareRequirements: 
          type: string
          description: 
            Требования к оборудованию (в виде текстового описания)
        safetyRequirements: 
          type: string
          description: 
            Требования по безопасности (в виде текстового описания)
        healthRestrictions: 
          type: string 
          description: 
            Ограничения по здоровью (в виде текстового описания)
        ageLimit: 
          $ref: '#/components/schemas/AgeLimit'
        availableLanguages:
          type: array
          description: 
            Список поддерживаемых языков
          items: 
            $ref: '#/components/schemas/Language'
        costs: 
          type: array
          description: 
            Тарифы на экскурсионные группы
          items:
            $ref: '#/components/schemas/GroupSizeCosts'
        transportType: 
          $ref: '#/components/schemas/TourTransportType'
        photos: 
          type: array
          items: 
            type: string
            example: https://opentest.info/photo.jpg
        
    AgeLimit: 
      type: integer
      description: 
        Возрастное ограничение (минимальный возраст)
      enum: 
        - 0
        - 6
        - 12
        - 16
        - 18

    Language: 
      type: string 
      description: 
        Язык
      enum: 
        - Русский
        - English

    GroupSizeCosts:
      type: object
      description: 
        Цена экскурсии для указанного размера группы
      required:
        - cost 
        - minGroupSize 
        - maxGroupSize 
      properties:
        cost: 
          $ref: '#/components/schemas/Cost'
        minGroupSize: 
          type: integer
          description: 
            Минимальный размер группы
        maxGroupSize: 
          type: integer 
          description: 
            Максимальный размер экскурсионной группы
        costsDescription: 
          type: string 
          description: 
            Описание услуг (что входит в цену)
        extraCosts: 
          type: string
          description: 
            Описание дополнительных расходов 

    Cost: 
      type: object
      description: 
        Цена
      required:
        - numCost 
        - currency
      properties:
        numCost: 
          type: number
          description: 
            Цена в целых единицах валюты
        currency: 
          $ref: '#/components/schemas/Currency'

    Currency:
      type: string 
      description: 
        Наименование валюты
      enum:
        - RUB
        - USD

    TourTransportType: 
      type: string
      description: 
        Тип транспорта
      enum: 
        - walking
        - scooter
        - bus

    TourDayStatus: 
      type: string 
      description: 
        Статус экскурсионного дня
      enum:
        - free
        - occupied

    TourDay: 
      type: object
      description: 
        Экскурсионный день
      required:
        - date 
        - status
      properties:
        date: 
          type: string 
          format: date 
        status: 
          $ref: '#/components/schemas/TourDayStatus'

    User:
      type: object
      properties:
        userName:
          type: string
          example: 'john doe'
          description: Имена участников
        userRole:
          type: string
          enum: ['guide', 'admin', 'participant']
          example: 'guide'
          description: Роли участников
        user_id:
          type: string
          example: 'user_12345'
          description: Идентификатор пользователя
      required:
        - userName
        - userRole
        - user_id

    Backup:
      type: object
      properties:
        backupID:
          type: string
          example: 'backup_12345'
          description: Идентификатор резервной копии
        createTime:
          type: string
          format: date-time
          example: '2025-03-03T12:00:00Z'
          description: Время создания резервной копии
        status:
          type: string
          enum: ['created', 'restoring', 'failed']
          example: 'created'
          description: Статус резервной копии
      required:
        - backupID
        - createTime
        - status

    UserRoleUpdate:
      type: object
      properties:
        newRole:
          type: string
          enum: ['guide', 'admin', 'participant']
          example: 'guide'
          description: Новая роль пользователя
      required:
        - newRole
        
    City: 
      type: string 
      enum:
        - Воронеж
        - Москва
        - Санкт-Петербург

    Country: 
      type: string 
      enum:
        - Россия
    