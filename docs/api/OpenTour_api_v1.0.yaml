openapi: 3.0.3
info:
  title: OpenTour
  version: v1.0


tags:
  - name: Users
    description: Работа с профилями участников
  - name: Tours 
    description: Работа с турами
  - name: Guids
    description: Работа с профилями гидов
  - name: Chats
    description: Работа с чатами
  - name: Feedback
    description: Работа с отзывами
  - name: Knowledge Base 
    description: Работа с базой знаний (заметки)
  - name: Site Management
    description: Административные функции



paths:
  /users/register:
    post:
      summary: Регистрация нового пользователя
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
      responses:
        201:
          description: Пользователь успешно зарегистрирован
        400:
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/login:
    post:
      summary: Авторизация пользователя
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        200:
          description: Успешный вход, возвращает JWT токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        401:
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/profile:
    get:
      summary: Получить профиль текущего пользователя
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        200:
          description: Данные профиля пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Требуется аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tours/:
    get: 
      summary: Получить список туров
      tags:
        - Tours 
      parameters:
        - name: count 
          in: query
          required: false 
          description: 
            Число туров в списке
          schema: 
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          description: 
            Сдвиг от начала списка (для постраничной выборки)
          schema: 
            type: integer
            default: 0 
        - name: country 
          in: query
          required: false
          schema: 
            $ref: '#/components/schemas/Country'
        - name: city
          in: query
          required: false
          schema: 
            $ref: '#/components/schemas/City'
        - name: ageLimit
          in: query
          required: false
          schema: 
            $ref: '#/components/schemas/AgeLimit'
        - name: transportType
          in: query
          required: false
          schema: 
            $ref: '#/components/schemas/TourTransportType'
        - name: date
          in: query
          required: false
          schema: 
            type: array
            items: 
              type: string 
              format: date
      responses:
        200: 
          description: OK
          content:
            application/json:
              schema: 
                type: array
                items: 
                  $ref: '#/components/schemas/Tour'
    post: 
      summary: Создать тур
      tags: 
        - Tours
      requestBody: 
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/Tour'
      responses: 
        201: 
          description: Усепешно создано

  /tours/{tour_id}:
    get:
      summary: Получить информацию о туре
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      responses: 
        200: 
          description: OK
          content:
            application/json:
              schema: 
                $ref: '#/components/schemas/Tour'
        404: 
          description: Не найдено
    delete:
      summary: Удалить тур 
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      responses: 
        200: 
          description: OK
    put: 
      summary: Изменить информацию о туре
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      requestBody: 
        content:
          application/json:
            schema: 
              $ref: '#/components/schemas/Tour'
      responses: 
        200: 
          description: OK

  /tours/{tour_id}/shedule: 
    get: 
      summary: Получить расписание тура
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      responses: 
        200: 
          description: OK
          content:
            application/json:
              schema: 
                type: array
                description: 
                  Список дней с указанием статуса
                items:
                  $ref: '#/components/schemas/SheduleTourDay'
    put: 
      summary: Изменить расписание тура
      tags: 
        - Tours
      parameters:
        - name: tour_id
          in: path
          required: true 
          schema: 
            type: integer
      requestBody: 
        content:
            application/json:
              schema: 
                type: array
                description: 
                  Список дней с указанием статуса
                items:
                  $ref: '#/components/schemas/SheduleTourDay'
      responses: 
        200: 
          description: OK
          
  /guids/{guide_id}:
    get:
      summary: Получить информацию о гиде
      tags:
        - Guids
      parameters:
        - name: guide_id 
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guide'
        404:
            description: Не найдено   
    delete:
      summary: удалить профиль гида
      tags:
        - Guids
      parameters:
        - name: guide_id 
          in: path
          required: true
          schema:
            type: integer       
      responses:
        200:
          description: OK
        404:
            description: Не найдено   
    post:
      summary: Создать профиль гида
      tags: 
        - Guids
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Guide'
      responses:
        201:        
          description: Успешно созданно   
        400:
          description: Ошибка в запросе
    put:
      summary: изменение профиля гида
      tags: 
        - Guids
      parameters:
          - name: guide_id 
            in: path
            required: true
            schema:
              type: integer
      requestBody:
        content:
          application/json:
              schema:
                type: array
                $ref: '#/components/schemas/Guide'
      responses:          
        200:
          description: OK        
        404:
          description: Не найдено

  /admin/users:
    get:
      tags:
        - Site Management
      summary: Получение списка пользователей
      responses:
        '200':
          description: Список участников
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Ошибка в запросе
        '404': 
          description: Пользователь(и) не найден(ы)
        '500':
          description: Ошибка сервера
                
  /admin/users/{user_id}:
    get:
      tags:
        - Site Management
      summary: Получение информации о пользователе
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: Уникальный идентификатор пользователя
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Ошибка в запросе
        '404': 
          description: Пользователь не найден
        '500':
          description: Ошибка сервера
    delete:
      tags:
        - Site Management
      summary: Удаление пользователя
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: Уникальный идентификатор пользователя
      responses:
        '200': 
          description: Участник успешно удален
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Пользователь user_12345 успешно удален'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '404': 
          description: Пользователь не найден
        '500':
          description: Ошибка сервера
    put:
      tags:
        - Site Management
      summary: Смена роли пользователя
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          description: Уникальный идентификатор пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRoleUpdate'
      responses:
        '200':
          description: Роль пользователя успешно изменена
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Роль пользователя user_12345 изменена на guide'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '404': 
          description: Пользователь не найден
        '500':
          description: Ошибка сервера
                  
  /admin/logs:
    get:
      tags:
        - Site Management
      summary: Получение логов системы
      responses:
        '200':
          description: Список логов системы
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    timeStamp:
                      type: string
                      format: date-time
                      example: '2025-03-03T12:00:00Z'
                      description: Время события
                    level:
                      type: string
                      enum: ['INFO', 'WARNING', 'ERROR', 'DEBUG', 'FATAL']
                      example: 'INFO'
                      description: Уровень важности лога
                    message:
                      type: string
                      example: 'Пользователь успешно вошел в систему'
                      description: Сообщение лога
                    user_id:
                      type: string
                      example: 'user_12345'
                      description: Идентификатор пользователя, вызвавшего событие 
                  required:
                    - timeStamp
                    - level
                    - message
                    - user_id
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
    delete:  
      tags:
        - Site Management
      summary: Очищение логов системы
      responses:
        '200':
          description: Логи успешно очищены
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Логи успешно очищены'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
                  
  /admin/backup:
    post:
      tags:
        - Site Management
      summary: Создание резервной копии
      responses:
        '200':
          description: Резервная копия успешно создана
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Резервная копия успешно создана'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера

  /admin/backup/list:
    get:
      tags:
        - Site Management
      summary: Получение списка резервных копий
      responses:
        '200':
          description: Список резервных копий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Backup'
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
                 
  /admin/backup/restore:
    post:
      tags:
        - Site Management
      summary: Восстановление данных из резервной копии
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                backupID:
                  type: string
                  example: 'backup_12345'
                  description: Идентификатор резервной копии для восстановления
              required:
                - backupID
      responses:
        '200':
          description: Данные успешно восстановлены из резервной копии
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Данные успешно восстановлены из резервной копии backup_12345'
                required:
                  - message
        '400':
          description: Ошибка в запросе
        '404':
          description: Резервная копия не найдена
        '500':
          description: Ошибка сервера

  /admin/analytics/users:
    get:
      tags:
        - Site Management
      summary: Просмотр статистики по пользователям
      responses:
        '200':
          description: Статистика по пользователям
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsers:
                    type: integer
                    example: 1500
                    description: Общее количество пользователей
                  activeUsers:
                    type: integer
                    example: 1000
                    description: Количество активных пользователей
                  inactiveUsers:
                    type: integer
                    example: 500
                    description: Количество неактивных пользователей
                required:
                  - totalUsers
                  - activeUsers
                  - inactiveUsers
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
                   
  /admin/analytics/content:
    get:
      tags:
        - Site Management
      summary: Просмотр статистики по контенту
      responses:
        '200':
          description: Статистика по контенту
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalNotes:
                    type: integer
                    example: 200
                    description: Общее количество заметок
                  totalTours:
                    type: integer
                    example: 50
                    description: Общее количество экскурсий
                  contentInteraction:
                    type: integer
                    example: 10000
                    description: Общее количество взаимодействий с контентом (просмотры, лайки, комментарии и т.д.)
                required:
                  - totalNotes
                  - totalTours
                  - contentInteraction
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера
                  
  /admin/analytics/system:
    get:
      tags:
        - Site Management
      summary: Аналитика работы системы
      responses:
        '200':
          description: Общая аналитика работы системы
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorsLast24h:
                    type: integer
                    example: 5
                    description: Количество ошибок за последние 24 часа
                  totalRequests:
                    type: integer
                    example: 100000
                    description: Общее количество запросов к системе
                required:
                  - errorsLast24h
                  - totalRequests
        '400':
          description: Ошибка в запросе
        '500':
          description: Ошибка сервера

      

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    UserLogin:
      type: object
      description: Учётные данные пользователя
      required: 
        - email
        - password
      properties:
        email:
          type: string
          format: email
          writeOnly: true
        password:
          type: string
          format: password
          writeOnly: true

    UserRegistration:
      type: object
      description: Данные для регистрации пользователя
      allOf: 
        - $ref: '#/components/schemas/UserLogin'
      required: 
        - username
      properties:
        username:
          type: string

    User:
      description: Пользователь системы
      type: object
      required:
        - userID
        - userName
        - userRoles
        - regDate
      properties:
        userID:
          type: integer
          example: 123
          description: Сквозной идентификатор пользователя
          readOnly: true
        userName:
          type: string
          example: 'john doe'
          description: Имя пользователя
        about: 
          type: string 
          description: Раздел о себе
        userRoles:
          type: array
          items:
            type: string
            enum: ['guide', 'admin', 'participant']
            example: 'guide'
          description: Роли участника
          readOnly: true
        regDate: 
          type: string
          format: date-time
          description: Время регистрации пользователя
          readOnly: true

    Guide:
      type: object
      description: Профиль экскурсовода
      allOf:
        - $ref: '#/components/schemas/User'
      properties:
        availableLanguages:
          type: array
          items: 
            $ref: '#/components/schemas/Language'
          description: 
            Языки которыми владеет экскурсовод
        guideRating:
          readOnly: true
          type: number
          description: 
            рейтинг экскурсовода
        guideNumberOfTour:
          readOnly: true
          type: integer
          description: 
            количество проведенных экскурсий
        guidePhotoProfile:
          type: string
          description: 
            Аватарка на профиле гида
        guidePhotos: 
          type: array
          items: 
            type: string
          description: остальные фото в профиле

    AuthToken:
      type: object
      properties:
        access_token:
          type: string
          description: JWT токен для авторизации
          readOnly: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Сообщение об ошибке          

    Booking: 
      type: object
      description: 
        Бронирование экскурсии
      properties: 
        bookingID: 
          type: integer
          readOnly: true
        userID: 
          type: integer
          description: 
            Идентификатор пользователя, осуществляющего бронирование
          readOnly: true
        tourID: 
          type: integer 
        sessionID: 
          type: integer
        tariffID: 
          type: integer

    Tour: 
      type: object
      description: 
        Экскурсия
      required:
        - tourID 
        - tourName 
        - tourSummary 
        - duration 
        - ageLimit 
        - availableLanguages 
        - costs 
        - shedule 
        - transportType 
      properties: 
        tourID: 
          type: integer
          readOnly: true
        tourName:
          type: string
        tourSummary: 
          type: string
          description: 
            Краткое описание экскурсии
        tourDescription:
          type: string
          description: 
            Полное описание экскурсии
        duration:
          type: integer
          description: 
            Длительность экскурсии (в минутах)
        hardwareRequirements: 
          type: string
          description: 
            Требования к оборудованию (в виде текстового описания)
        safetyRequirements: 
          type: string
          description: 
            Требования по безопасности (в виде текстового описания)
        healthRestrictions: 
          type: string 
          description: 
            Ограничения по здоровью (в виде текстового описания)
        ageLimit: 
          $ref: '#/components/schemas/AgeLimit'
        availableLanguages:
          type: array
          description: 
            Список поддерживаемых языков
          items: 
            $ref: '#/components/schemas/Language'
        costs: 
          type: array
          description: 
            Тарифы на экскурсионные группы
          items:
            $ref: '#/components/schemas/Tariff'
        transportType: 
          $ref: '#/components/schemas/TourTransportType'
        photos: 
          type: array
          items: 
            type: string
            example: https://opentest.info/photo.jpg
        
    AgeLimit: 
      type: integer
      description: 
        Возрастное ограничение (минимальный возраст)
      enum: 
        - 0
        - 6
        - 12
        - 16
        - 18

    Language: 
      type: string 
      description: 
        Язык
      enum: 
        - Русский
        - English

    Tariff:
      type: object
      description: 
        Тариф на экскурсию. Может быть персональным и общим, при этом группы могут быть разных размеров
      required:
        - cost 
        - minGroupSize 
        - maxGroupSize 
      properties:
        tariffID: 
          type: integer 
          description: 
            Идентификатор тарифа
          readOnly: true
        cost: 
          $ref: '#/components/schemas/Cost'
        minGroupSize: 
          type: integer
          description: 
            Минимальный размер группы
        maxGroupSize: 
          type: integer 
          description: 
            Максимальный размер экскурсионной группы
        costsDescription: 
          type: string 
          description: 
            Описание услуг (что входит в цену)
        extraCosts: 
          type: string
          description: 
            Описание дополнительных расходов 
        isPersonal:
          type: string
          format: boolean
          description:
            Флаг персонального тарифа - группа только ваша

    Cost: 
      type: object
      description: 
        Цена
      required:
        - numCost 
        - currency
      properties:
        numCost: 
          type: number
          description: 
            Цена в целых единицах валюты
        currency: 
          $ref: '#/components/schemas/Currency'

    Currency:
      type: string 
      description: 
        Наименование валюты
      enum:
        - RUB
        - USD

    TourTransportType: 
      type: string
      description: 
        Тип транспорта
      enum: 
        - walking
        - scooter
        - bus

    SheduleTourDay: 
      type: object
      description: 
        Экскурсионный день
      required:
        - date 
        - availableSessions
      properties:
        date: 
          type: string 
          format: date 
        availableSessions:
          type: array 
          items: 
            $ref: '#/components/schemas/SheduleTourSession'

    SheduleTourSession: 
      type: object
      description: 
        Экскурсионное окно
      required:
        - sessionID
        - startTime
        - endTime
        - availavbleTariffs
      properties: 
        sessionID: 
          type: integer
        startTime: 
          type: string
          format: time 
        endTime: 
          type: string 
          format: time 
        availavbleTariffs: 
          type: array
          items: 
            type: integer
          description: 
            Список идентификаторов доступных тарифов

    Backup:
      type: object
      properties:
        backupID:
          type: string
          example: 'backup_12345'
          description: Идентификатор резервной копии
        createTime:
          type: string
          format: date-time
          example: '2025-03-03T12:00:00Z'
